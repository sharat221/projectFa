<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disaster Response Resource Allocator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; background: #f4f4f4; margin: 0; }
    header { background: #000; color: #fff; padding: 20px; text-align: center; font-size: 1.5em; }
    .container { padding: 20px; max-width: 1200px; margin: auto; }
    h2 { margin-top: 30px; font-size: 1.2em; border-bottom: 2px solid #000; padding-bottom: 5px; }
    button { margin-top: 10px; padding: 10px 15px; border: 1px solid #000; background: #fff; cursor: pointer; }
    button:hover { background: #000; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
    th, td { border: 1px solid #000; padding: 10px; text-align: left; }
    th { background: #000; color: #fff; }
    #map { width: 100%; height: 500px; margin-top: 15px; border: 2px solid #000; }
  </style>
</head>
<body>
  <header>Disaster Response Resource Allocator</header>
  <div class="container">
    <h2>Load Incident Data</h2>
    <button onclick="loadIncidents()">Fetch Incidents</button>

    <h2>Incident Map</h2>
    <div id="map"></div>

    <h2>Incident Allocation Table</h2>
    <table id="incidentTable">
      <thead>
        <tr>
          <th>Incident Type</th>
          <th>Location</th>
          <th>Severity</th>
          <th>Assigned Resource</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([12.9716, 77.5946], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

    function loadIncidents() {
      fetch("http://127.0.0.1:5000/incidents")
        .then(response => response.json())
        .then(incidents => renderIncidents(incidents))
        .catch(error => alert("Error fetching incidents: " + error));
    }

    function renderIncidents(incidents) {
      const tableBody = document.querySelector("#incidentTable tbody");
      tableBody.innerHTML = "";
      incidents.forEach(incident => {
        const row = tableBody.insertRow();
        row.insertCell(0).innerText = incident.type;
        row.insertCell(1).innerText = incident.location;
        row.insertCell(2).innerText = incident.severity;
        row.insertCell(3).innerText = incident.resource;

        let color = "blue";
        if (incident.severity === "Critical") color = "red";
        else if (incident.severity === "High") color = "orange";
        else if (incident.severity === "Moderate") color = "yellow";

        const marker = L.circleMarker(incident.coords, {
          radius: 8, color: color, fillColor: color, fillOpacity: 0.7
        }).addTo(map);

        marker.bindPopup(`<b>${incident.type}</b><br>${incident.location}<br>Severity: ${incident.severity}<br>Resource: ${incident.resource}`);
      });
    }
  </script>
</body>
</html>
